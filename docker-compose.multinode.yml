#
# Cluster Cassandra MULTINODO (Etapa 2 - replicacion + sharding).
#
# - 3 nodos cassandra-1, cassandra-2, cassandra-3 en el mismo DC (dc1).
# - keyspace creado con NetworkTopologyStrategy y replication_factor=3.
# - Token vnodes (default num_tokens=16) reparten particiones entre nodos.
# - El consumidor habla con cualquier nodo (port 9042 en cassandra-1).
#
# Uso:
#   docker compose -f docker-compose.multinode.yml up -d
#   # esperar ~2 min al bootstrap completo de los 3 nodos
#   docker exec cassandra-1 nodetool status
#   # debe mostrar 3 nodos UN (Up + Normal)
#
services:
  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

  cassandra-1:
    image: cassandra:4.1
    container_name: cassandra-1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: wikimedia-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
    volumes:
      - cassandra1_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'DESCRIBE KEYSPACES'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s

  cassandra-2:
    image: cassandra:4.1
    container_name: cassandra-2
    depends_on:
      cassandra-1:
        condition: service_healthy
    environment:
      CASSANDRA_CLUSTER_NAME: wikimedia-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
    volumes:
      - cassandra2_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'DESCRIBE KEYSPACES'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s

  cassandra-3:
    image: cassandra:4.1
    container_name: cassandra-3
    depends_on:
      cassandra-2:
        condition: service_healthy
    environment:
      CASSANDRA_CLUSTER_NAME: wikimedia-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
    volumes:
      - cassandra3_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'DESCRIBE KEYSPACES'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 150s

  cassandra-init:
    image: cassandra:4.1
    container_name: cassandra-init
    depends_on:
      cassandra-3:
        condition: service_healthy
    environment:
      CASSANDRA_HOST: cassandra-1
      CASSANDRA_PORT: 9042
      SCHEMA_FILE: /init/schema.cql
    volumes:
      - ./cassandra/schema_multinode.cql:/init/schema.cql:ro
      - ./cassandra/init.sh:/init/init.sh:ro
    entrypoint: ["bash", "/init/init.sh"]
    restart: "no"

  spark-master:
    image: apache/spark:4.0.2
    container_name: spark-master-proyectoFinal
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./spark/jobs:/opt/spark/jobs

  spark-worker:
    image: apache/spark:4.0.2
    container_name: spark-worker-proyectoFinal
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]

volumes:
  cassandra1_data:
  cassandra2_data:
  cassandra3_data:
